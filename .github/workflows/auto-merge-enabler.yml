name: auto-merge-enabler

# §3.2 item 7's arming mechanism, ported from superbot's auto-merge-enabler
# pattern: turn ON GitHub-native auto-merge for session PRs so they merge
# themselves the moment the required `kit-quality` check passes — the session
# just opens the PR born-red; GitHub does the gated merge when the card flips.
#
# HARD REQUIREMENTS (repo settings — provisioning row P10, see
# docs/current-state.md; the workflow is inert until these exist):
#   1. Settings → General → Pull Requests → "Allow auto-merge" = ON.
#   2. A ruleset on `main` REQUIRING the "kit-quality" status check.
#
# KL-0 GUARD (this repo's own lesson, PR #4): with NO required check on main,
# enabling auto-merge merges the PR INSTANTLY — a born-red session card lands
# alone and the gate is inverted. So this workflow first asks the rules API
# whether main actually requires status checks and refuses to arm otherwise.
#
# CARVE-OUT: label `do-not-automerge` at PR open = never armed.
#
# Provenance + reliability (Q-0105 pattern): ported 2026-07-09 (KL-1).
# UNVERIFIED — watch the first few PRs; delete if it misfires (native
# auto-merge can always be toggled by hand).

on:
  pull_request:
    # `synchronize` (every push to the PR head) re-arms native auto-merge:
    # arming is idempotent — `gh pr merge --auto` no-ops if already armed and
    # RE-ARMS if a behind-state push disarmed it, and NEVER merges anything
    # itself (the merge stays gated by the required `kit-quality` check). This
    # narrows the "green-behind stall" class: a fix-push or `git merge
    # origin/main` re-arms on the up-to-date head. It does NOT fully close it —
    # a PR that goes behind AFTER its last push still needs the owner repo
    # setting "automatically update branches" (⚑ see docs/CAPABILITIES.md).
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-enabler-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  enable-auto-merge:
    # claim/ rides alongside claude/: control fast-lane claim PRs land on
    # claim/* heads, and a claude/-only condition left them green+clean but
    # unarmed forever (live hit: PR #293 stalled ~2 h during the v1.15.0
    # wave-A distribution until re-landed on claude/* as #297).
    if: >-
      github.repository == 'menno420/substrate-kit' &&
      github.event.pull_request.draft == false &&
      (startsWith(github.head_ref, 'claude/') ||
       startsWith(github.head_ref, 'claim/')) &&
      !contains(github.event.pull_request.labels.*.name, 'do-not-automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Check main actually requires status CONTEXTS (KL-0/KL-1 guard)
        id: rules
        env:
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Count required check CONTEXTS, not rules: PR #7 (KL-1) merged
          # instantly because a required_status_checks RULE existed on main
          # while its context list was effectively empty — the rule-count
          # guard passed and auto-merge fired with nothing to wait for.
          contexts="$(gh api "repos/$GITHUB_REPOSITORY/rules/branches/main" \
            --jq '[.[] | select(.type == "required_status_checks")
                   | .parameters.required_status_checks // [] | .[].context]')"
          count="$(printf '%s' "$contexts" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          echo "required contexts ($count): $contexts"
          echo "required=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" = "0" ]; then
            echo "::warning::main requires no status-check CONTEXTS — arming auto-merge would merge instantly (the KL-0 PR #4 / KL-1 PR #7 footgun). Refusing to arm; make 'kit-quality' a required check first (P10)."
          fi
      - name: Re-check the do-not-automerge label FRESH (KL-5 race guard)
        # The event payload snapshots labels at PR-creation time, and an
        # MCP-created PR gets its label in a SECOND call right after create —
        # so the job-level label condition passes while the label is still
        # landing (this exact race armed auto-merge on PR #17, the
        # owner-blessed bench-tree PR, defeating the §5.0 gate; disarmed by
        # hand). Wait a grace beat, then re-read labels from the API and
        # refuse to arm if the label is present NOW.
        id: label
        if: steps.rules.outputs.required != '0'
        env:
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          sleep 15
          labels="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/labels" --jq '[.[].name] | join(",")')"
          echo "labels on re-read: $labels"
          case ",$labels," in
            *,do-not-automerge,*)
              echo "do-not-automerge present on re-read — refusing to arm."
              echo "skip=1" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "skip=0" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Enable native auto-merge (squash)
        if: steps.rules.outputs.required != '0' && steps.label.outputs.skip == '0'
        env:
          # Prefer a PAT so the eventual merge attributes to a real user
          # (superbot's cadence-trigger lesson); GITHUB_TOKEN is the fallback.
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if gh pr merge --auto --squash "$PR" --repo "$GITHUB_REPOSITORY"; then
            echo "Auto-merge enabled for PR #$PR — it merges when 'kit-quality' is green."
          else
            echo "::warning::Could not enable auto-merge for PR #$PR. Confirm: (1) 'Allow auto-merge' is ON, (2) main requires the 'kit-quality' check, (3) the token has Pull requests + Contents write."
          fi

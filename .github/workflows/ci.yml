# kit-quality — the ONE required check (founding plan §3.2).
#
# Every §3.2 job runs as a step of a single job so the branch ruleset needs
# exactly one required status check context: "kit-quality". Runs on the
# Python floor 3.10 (§3.2 item 6; the 3.10–3.13 matrix is deferred
# productization). Item 7 (the ruleset that makes this check REQUIRED +
# "Allow auto-merge") is a repo-settings action — see docs/current-state.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kit-quality:
    name: kit-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the session gate restores card mtimes from commit
          # times so `check` deterministically picks the PR's own card.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dev tools
        run: python3 -m pip install pytest ruff

      - name: Kit test suite (§3.2 item 1)
        run: python3 -m pytest tests/ -q

      - name: Dist byte-equality pin (§3.2 item 2)
        # The committed dist/bootstrap.py must equal a fresh build — nobody
        # edits src/ and forgets `python3 src/build_bootstrap.py`.
        run: |
          python3 src/build_bootstrap.py
          git diff --exit-code dist/bootstrap.py

      - name: Engine lint bans (§3.2 item 3 — no print/assert/subprocess)
        # Config lives in pyproject.toml [tool.ruff*]: T20 + S101 + TID251.
        run: python3 -m ruff check src/engine/

      - name: Idea index (§5.4 — B4 frontmatter + backlog consistency)
        # docs/ideas/ entries carry the idea-outcome frontmatter; the README
        # backlog indexes every file. A convention ships with its checker.
        run: python3 scripts/check_idea_index.py

      - name: Program law (§8.3 — PL register grammar + planted pointers + owner-gate label)
        # docs/program/rulings.md is the canonical PL-register; pointer
        # sections in the planted templates cite PL-IDs, never copy bodies.
        # --label-gate (audit 2026-07-09): a PR diff touching an owner-gated
        # law surface must carry `do-not-automerge` — forgetting the label
        # can no longer auto-merge a law change (the #22 enforcement half;
        # docs/operations/auto-merge-guards.md). Labels are re-read FRESH
        # from the API at step execution time, never from the stale event
        # payload (the #22 lesson) — so label-then-re-run goes green.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            PR_LABELS="$(gh api "repos/$GITHUB_REPOSITORY/issues/${{ github.event.pull_request.number }}/labels" --jq '[.[].name] | join(",")')"
            export PR_LABELS
            echo "fresh labels: ${PR_LABELS:-<none>}"
          fi
          python3 scripts/check_program_law.py --label-gate

      - name: Cold-adoption smoke (§3.2 item 4 — the KL-7 RED→ENGAGED→GREEN arc)
        # A bare adopt must be BORN RED (the engagement gate: unrendered
        # banners/slots, no CI, idle session loop — the fleet-review §4
        # stranding), and walking the printed checklist must turn it GREEN.
        # Then the --wire-enforcement exit path (born-self-verifying clause).
        run: |
          scratch="$(mktemp -d)"
          cp dist/bootstrap.py "$scratch/"
          (
            cd "$scratch"
            python3 bootstrap.py adopt | tee adopt.out
            grep -q "NOT ENGAGED" adopt.out
            test -f .substrate/ci/substrate-gate.yml
            if python3 bootstrap.py check --strict; then
              echo "expected RED after a bare adopt (engagement gate)"; exit 1
            fi
            # Walk the checklist — (1) render: answer every slot, fill live…
            for slot in integration_mode project_name primary_language \
                architecture_layers verify_command ownership_model doc_roots \
                owner_profile mutation_seam review_ritual drift_resolution \
                staleness_review new_area_ownership; do
              python3 bootstrap.py answer "$slot" \
                "engaged smoke value for $slot long enough for every substance floor" >/dev/null
            done
            python3 bootstrap.py render --live
            # …(2) enforcement: install the staged gate workflow…
            mkdir -p .github/workflows
            cp .substrate/ci/substrate-gate.yml .github/workflows/
            # …(3) session loop: the first real (complete) session card.
            printf '%s\n' '# first session' '' '> **Status:** `complete`' '' \
              '💡 first idea' '⟲ previous-session review: n/a (first session)' \
              '📊 Model: smoke · low · docs-only' > .sessions/2026-01-01-first.md
            python3 bootstrap.py check --strict
            python3 bootstrap.py check --strict --require-session-log \
              --session-log .sessions/2026-01-01-first.md
          )
          scratch_we="$(mktemp -d)"
          cp dist/bootstrap.py "$scratch_we/"
          (
            cd "$scratch_we"
            python3 bootstrap.py adopt --wire-enforcement
            test -f .github/workflows/substrate-gate.yml
            test -f .claude/settings.json
            # Enforcement is wired, but render + session loop are still
            # pending — the gate must hold red here too.
            if python3 bootstrap.py check --strict; then
              echo "expected RED after adopt --wire-enforcement alone"; exit 1
            fi
          )

      - name: Session gate (§3.2 item 5 — dogfood, the born-red discipline)
        # PR-diff-aware card selection: gate on the session card this PR/push
        # actually touches, passed via `check --session-log` — this replaced
        # the git-mtime-restore shim (a CI checkout flattens every mtime, so
        # the engine's newest-by-mtime guess was arbitrary here). No card in
        # the diff -> argument omitted -> the engine's mtime fallback
        # (fail-open; on main every merged card is complete). A PR that adds
        # an `in-progress` card stays red until the card flips complete.
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          card="$(git diff --name-only --diff-filter=d "$range" -- '.sessions/*.md' ':!.sessions/README.md' 2>/dev/null | tail -1)"
          echo "session gate card: ${card:-<none - mtime fallback>}"
          python3 dist/bootstrap.py check --strict --require-session-log ${card:+--session-log "$card"}

  # ── TEMPORARY legacy-context aliases (delete after P10 lands) ─────────────
  # Discovered live in PR #6: an owner-landed ruleset on main requires the
  # ORIGINAL job names "Kit test suite" and "Cold-adoption smoke (adopt +
  # check --strict)". Those jobs were folded into kit-quality above, so the
  # legacy contexts would sit "expected" forever and block every merge. These
  # aliases report the legacy contexts as kit-quality's result. Once the
  # ruleset requires `kit-quality` instead (docs/current-state.md 👤 P10),
  # delete both jobs.
  #
  # `if: always()` + explicit result check, NOT a bare `needs:` — the KL-1
  # PR #7 hole: when kit-quality FAILS, a bare-needs alias is SKIPPED, and
  # GitHub treats a skipped check run as SATISFYING a required status check,
  # so auto-merge merged a red PR. The aliases must conclude failure, never
  # skipped, when kit-quality is not a success.
  legacy-alias-test:
    name: Kit test suite
    needs: kit-quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.kit-quality.result }}" != "success" ]; then
            echo "kit-quality result: ${{ needs.kit-quality.result }} — failing the alias (a skipped alias would satisfy the required context)."
            exit 1
          fi
          echo "legacy required-context alias — real gate is kit-quality"
  legacy-alias-smoke:
    name: Cold-adoption smoke (adopt + check --strict)
    needs: kit-quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.kit-quality.result }}" != "success" ]; then
            echo "kit-quality result: ${{ needs.kit-quality.result }} — failing the alias (a skipped alias would satisfy the required context)."
            exit 1
          fi
          echo "legacy required-context alias — real gate is kit-quality"

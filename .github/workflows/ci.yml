# kit-quality — the ONE required check (founding plan §3.2).
#
# Every §3.2 job runs as a step of a single job so the branch ruleset needs
# exactly one required status check context: "kit-quality". Runs on the
# Python floor 3.10 (§3.2 item 6; the 3.10–3.13 matrix is deferred
# productization). Item 7 (the ruleset that makes this check REQUIRED +
# "Allow auto-merge") is a repo-settings action — see docs/current-state.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kit-quality:
    name: kit-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history: the session gate restores card mtimes from commit
          # times so `check` deterministically picks the PR's own card.
          fetch-depth: 0

      - name: Control fast lane detect (KL-8 — control/**-only diff)
        # Heartbeat/inbox commits are coordination, not code: a control-only
        # diff skips every heavy step below and the job reports GREEN fast.
        # Deliberately an IN-JOB short-circuit, never a `paths-ignore` — this
        # context is REQUIRED, and a required check that never reports stays
        # "pending" forever — auto-merge would jam on every heartbeat PR
        # (the fleet-protocol lesson, 2026-07-09). Empty/unreadable diffs
        # fail safe onto the full suite.
        id: lane
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          files="$(git diff --name-only "$range" 2>/dev/null || true)"
          control_only=false
          if [ -n "$files" ] && [ -z "$(printf '%s\n' "$files" | grep -v '^control/')" ]; then
            control_only=true
          fi
          echo "control_only=$control_only" >> "$GITHUB_OUTPUT"
          echo "control-only diff: $control_only"
      - name: Control fast lane (green by design)
        if: steps.lane.outputs.control_only == 'true'
        run: |
          echo "control/**-only diff — heavy suite skipped; this required"
          echo "context still reports green so heartbeat PRs auto-merge."
      - name: Control-status gate (fast lane — the one check a control diff must still pass)
        if: steps.lane.outputs.control_only == 'true'
        # The lane skips the heavy suite, but a control-only PR edits exactly
        # the files check_status_current validates — without this step a
        # heartbeat-deleting control PR merges GREEN and pre-reddens the NEXT
        # unrelated full-suite PR (fleet adoption review 2026-07-09, finding
        # 1). Scoped + stdlib-only on the system python3 (no setup-python, no
        # pip install): the lane stays fast, and heartbeat PRs still need no
        # session card (--status-only never touches the session-log seam).
        run: python3 dist/bootstrap.py check --strict --status-only

      - name: Inbox append-only gate (control/inbox.md pure-append + ORDER grammar)
        # control/inbox.md is one-writer/append-only by protocol
        # (control/README.md), but nothing enforced it: PR #34 (an ORDER
        # append) merged 19 s after open with zero validation — a session
        # could rewrite or erase orders on a green control-only PR (fleet
        # adoption review 2026-07-09, issue #36 report 2). This gate holds the
        # PR red unless the control/inbox.md diff is PURE-APPEND vs the
        # merge-base (the old bytes are a prefix of the new file) and the
        # appended text is well-formed ORDER blocks. Runs on BOTH lanes (no
        # lane condition): an inbox append rides the fast lane, but a mixed PR
        # could smuggle an inbox edit through the full lane too. Stdlib-only
        # system python3; git extracts the base blob here in bash because the
        # engine never shells out (§3.2 subprocess ban) — the same split as
        # the session-log gate. Self-skips when control/inbox.md is untouched.
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            base="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
            range="origin/${{ github.base_ref }}...HEAD"
          else
            base="${{ github.event.before }}"
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          changed="$(git diff --name-only "$range" 2>/dev/null | grep -Fx 'control/inbox.md' || true)"
          if [ -z "$changed" ]; then
            echo "control/inbox.md not in diff — inbox append-only gate skipped."
          else
            basefile="$(mktemp)"
            git show "$base:control/inbox.md" > "$basefile" 2>/dev/null || : > "$basefile"
            python3 dist/bootstrap.py check --strict --status-only --inbox-base "$basefile"
          fi

      - name: Claims-only fast-lane guard (claude/* work PRs must carry a session card)
        if: steps.lane.outputs.control_only == 'true'
        # The #451 fast-lane race: a `claude/*` WORK PR whose ENTIRE diff is
        # only `control/claims/**` rides the control fast lane, skips the
        # born-red session gate, and auto-merges card-less — a claim-file
        # commit masquerading as finished work. This gate holds such a PR RED.
        # It runs ONLY on the fast lane and ONLY for `claude/*` heads: a
        # `claim/*` standalone-claim PR is MEANT to ride the lane card-less
        # (control/claims/README.md § "Land the claim on main FAST"), so a
        # non-`claude/*` head exits 0 immediately. The base blob / changed
        # files come from git in bash — the same merge-base idiom as the inbox
        # append-only gate above (§3.2 subprocess ban keeps the engine out of
        # git). A `claude/*` PR that carries any path outside control/claims/
        # (its real work + its .sessions/ card) is on the FULL lane, not this
        # one, so it never reaches this step — by construction this fires only
        # on the pure-claim `claude/*` diff it exists to reject.
        #
        # fastlane-cardless: claim/
        # ^ Self-declared card-less fast-lane prefixes: `claim/*` standalone-claim
        # PRs ride the fast lane card-LESS by design (control/claims/README.md
        # § "Land the claim on main FAST") — the guard's `case` above cards
        # `claude/*` ONLY and lets `claim/*` fall through the bare `*)` arm.
        # This machine-readable declaration is the host-local ground truth the
        # REVERSE fast-lane-symmetry advisory (engine.checks.check_fastlane_symmetry)
        # reads to tell an INTENTIONAL card-less prefix apart from an ACCIDENTAL
        # card-less merge hole — a prefix the auto-merge-enabler ARMS (so it rides
        # the fast lane) that the guard never CARDS and this line never declares.
        # Keep it in sync with the enabler's armed prefixes + guards.FASTLANE_*.
        run: |
          head_ref="${{ github.head_ref }}"
          case "$head_ref" in
            claude/*) ;;
            *) echo "guard N/A — head '$head_ref' is not a claude/* branch (claim/* and others ride the fast lane card-less by design)."; exit 0 ;;
          esac
          if [ -n "${{ github.base_ref }}" ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          changed="$(git diff --name-only "$range" 2>/dev/null || true)"
          if [ -z "$changed" ]; then
            echo "no changed files resolved — nothing to guard."; exit 0
          fi
          non_claims="$(printf '%s\n' "$changed" | grep -v '^control/claims/' || true)"
          if [ -z "$non_claims" ]; then
            echo "::error::A claude/* work PR whose ENTIRE diff is only control/claims/** rode the control fast lane and would auto-merge card-less (the #451 race). A claude/* PR must carry real work plus its .sessions/ session card — which puts it on the full lane. If this is a standalone claim, land it on a claim/* branch (control/claims/README.md)."
            printf 'claims-only claude/* diff:\n%s\n' "$changed"
            exit 1
          fi
          echo "claude/* PR carries non-claim paths — not a claims-only diff; guard passes."

      - uses: actions/setup-python@v6
        if: steps.lane.outputs.control_only != 'true'
        with:
          python-version: "3.10"
      - name: Install dev tools
        if: steps.lane.outputs.control_only != 'true'
        run: python3 -m pip install pytest ruff

      - name: Kit test suite (§3.2 item 1)
        if: steps.lane.outputs.control_only != 'true'
        run: python3 -m pytest tests/ -q

      - name: Dist byte-equality pin (§3.2 item 2)
        if: steps.lane.outputs.control_only != 'true'
        # The committed dist/bootstrap.py must equal a fresh build — nobody
        # edits src/ and forgets `python3 src/build_bootstrap.py`.
        run: |
          python3 src/build_bootstrap.py
          git diff --exit-code dist/bootstrap.py

      - name: Engine lint bans (§3.2 item 3 — no print/assert/subprocess)
        if: steps.lane.outputs.control_only != 'true'
        # Config lives in pyproject.toml [tool.ruff*]: T20 + S101 + TID251.
        run: python3 -m ruff check src/engine/

      - name: Idea index (§5.4 — B4 frontmatter + backlog consistency)
        if: steps.lane.outputs.control_only != 'true'
        # docs/ideas/ entries carry the idea-outcome frontmatter; the README
        # backlog indexes every file. A convention ships with its checker.
        run: python3 scripts/check_idea_index.py

      - name: Retro index (docs/retro reachability — no unindexed retro file)
        if: steps.lane.outputs.control_only != 'true'
        # Idea 2026-07-10 (the PR #76 unindexed wind-down addendum, invisible
        # until the gen-2-boot reconcile #78): every docs/retro/*.md is linked
        # from its README, and every relative README link resolves.
        run: python3 scripts/check_retro_index.py

      - name: CHANGELOG structure ([Unreleased] keep-a-changelog shape)
        if: steps.lane.outputs.control_only != 'true'
        # Idea 2026-07-09 (twice-reproduced mid-section `### Fixed` defect +
        # the KF-5 hand-move at every cut): known headings only, each at most
        # once, canonical order, bullets under headings, prose in the preamble.
        run: python3 scripts/check_changelog_structure.py

      - name: No false merge-walls (forward-binding surfaces don't re-seed "agents cannot merge")
        if: steps.lane.outputs.control_only != 'true'
        # Three sessions hand-removed the SAME regression from three layers
        # (templates → rendered docs → skills): a FALSE standing prohibition
        # asserting an agent cannot land a green PR ("classifier-denied since",
        # "owner is the merge authority", "agent-unlandable"). Ground truth:
        # merging a green PR is normal agent work (proven ~20× on 2026-07-18).
        # This gate scans ONLY forward-binding surfaces (templates, skill
        # bodies, live docs, root constitution/capabilities) and fails on a
        # re-seed; dated ledger records, repudiations, and historical sections
        # pass. Stdlib-only on the system python3 (no engine/pytest dep).
        # tools/check_no_false_walls.py.
        run: python3 tools/check_no_false_walls.py

      - name: Taxonomy sync (PL-004 — TASK_CLASSES ⇄ ladder ⇄ telemetry README)
        if: steps.lane.outputs.control_only != 'true'
        # Idea 2026-07-09 (PL-010 friction: three task-class surfaces updated
        # by hand with nothing enforcing agreement): the ladder table's first
        # column and the README class list stay set-equal to the canonical
        # MODEL_TASK_CLASSES tuple, and the README's class count is honest.
        run: python3 scripts/check_taxonomy_sync.py

      - name: Program law (§8.3 — PL register grammar + planted pointers + owner-gate label)
        if: steps.lane.outputs.control_only != 'true'
        # (Safe to skip on the control lane: control-only means NOTHING
        # outside control/** changed, so no law surface can be smuggled.)
        # docs/program/rulings.md is the canonical PL-register; pointer
        # sections in the planted templates cite PL-IDs, never copy bodies.
        # --label-gate (audit 2026-07-09): a PR diff touching an owner-gated
        # law surface must carry `do-not-automerge` — forgetting the label
        # can no longer auto-merge a law change (the #22 enforcement half;
        # docs/operations/auto-merge-guards.md). Labels are re-read FRESH
        # from the API at step execution time, never from the stale event
        # payload (the #22 lesson) — so label-then-re-run goes green.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            PR_LABELS="$(gh api "repos/$GITHUB_REPOSITORY/issues/${{ github.event.pull_request.number }}/labels" --jq '[.[].name] | join(",")')"
            export PR_LABELS
            echo "fresh labels: ${PR_LABELS:-<none>}"
          fi
          python3 scripts/check_program_law.py --label-gate

      - name: Bench integrity (§5.0 — pin-path label gate + append-only results)
        if: steps.lane.outputs.control_only != 'true'
        # Layer 1 of the bench pin (D-24): rubric/tasks/seeds changes must
        # ride a `do-not-automerge` PR; bench/results/ history is immutable
        # (index.json append-only). Labels are read from the event payload —
        # after labeling an unlabeled red PR, push (or re-run) so a fresh
        # payload carries the label.
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: python3 scripts/check_bench_integrity.py

      - name: Cold-adoption smoke (§3.2 item 4 — the KL-7 RED→ENGAGED→GREEN arc)
        if: steps.lane.outputs.control_only != 'true'
        # A bare adopt must be BORN RED (the engagement gate: unrendered
        # banners/slots, no CI, idle session loop — the fleet-review §4
        # stranding + the KL-8 seed status heartbeat), and walking the
        # printed checklist must turn it GREEN.
        # Then the --wire-enforcement exit path (born-self-verifying clause).
        run: |
          scratch="$(mktemp -d)"
          cp dist/bootstrap.py "$scratch/"
          (
            cd "$scratch"
            python3 bootstrap.py adopt | tee adopt.out
            grep -q "NOT ENGAGED" adopt.out
            test -f .substrate/ci/substrate-gate.yml
            if python3 bootstrap.py check --strict; then
              echo "expected RED after a bare adopt (engagement gate)"; exit 1
            fi
            # Walk the checklist — (1) render: answer every slot, fill live…
            for slot in integration_mode project_name primary_language \
                architecture_layers verify_command ownership_model doc_roots \
                owner_profile mutation_seam review_ritual drift_resolution \
                staleness_review new_area_ownership fleet_status_command \
                fleet_siblings fleet_dark_repos; do
              python3 bootstrap.py answer "$slot" \
                "engaged smoke value for $slot long enough for every substance floor" >/dev/null
            done
            python3 bootstrap.py render --live
            # …(2) enforcement: install the staged gate workflow…
            mkdir -p .github/workflows
            cp .substrate/ci/substrate-gate.yml .github/workflows/
            # …(3) session loop: the first real (complete) session card…
            printf '%s\n' '# first session' '' '> **Status:** `complete`' '' \
              '💡 first idea' '⟲ previous-session review: n/a (first session)' \
              '📊 Model: smoke · low · docs-only' > .sessions/2026-01-01-first.md
            # …(4) control loop (KL-8): the seed status.md has no heartbeat
            # and holds strict RED until the first real overwrite.
            if python3 bootstrap.py check --strict; then
              echo "expected RED while control/status.md is still the seed"; exit 1
            fi
            printf '%s\n' '# smoke · status' "updated: $(date -u +%FT%TZ)" \
              'phase: cold-adopt smoke' 'health: green' 'last-shipped: none' \
              'blockers: none' 'orders: acked= done=' '⚑ needs-owner: none' \
              'notes: first heartbeat (smoke)' > control/status.md
            python3 bootstrap.py check --strict
            python3 bootstrap.py check --strict --require-session-log \
              --session-log .sessions/2026-01-01-first.md
          )
          scratch_we="$(mktemp -d)"
          cp dist/bootstrap.py "$scratch_we/"
          (
            cd "$scratch_we"
            python3 bootstrap.py adopt --wire-enforcement
            test -f .github/workflows/substrate-gate.yml
            test -f .claude/settings.json
            # Enforcement is wired, but render + session loop are still
            # pending — the gate must hold red here too.
            if python3 bootstrap.py check --strict; then
              echo "expected RED after adopt --wire-enforcement alone"; exit 1
            fi
          )

      - name: Session gate (§3.2 item 5 — dogfood, the born-red discipline)
        if: steps.lane.outputs.control_only != 'true'
        # (Control lane: a heartbeat PR touches no .sessions/ card and needs
        # none — coordination writes are exempt from the card ritual.)
        # PR-diff-aware card selection: gate on the session cards this
        # PR/push actually touches, passed via `check --session-log` — this
        # replaced the git-mtime-restore shim (a CI checkout flattens every
        # mtime, so the engine's newest-by-mtime guess was arbitrary here).
        # EVERY card in the diff is graded, never a single picked one: the
        # old `tail -1` picker graded only the last-sorted card, so a PR
        # that ADDED an in-progress card and MODIFIED a later-sorting
        # sibling shipped the in-progress card GREEN (the multi-card
        # shadowing loophole, venture-lab #33 head 798a3d0 — the kit's own
        # gate had the same picker). Added in-progress cards red via the
        # engine's in-progress hold; ANY red card fails the step. No card
        # in the diff -> argument omitted -> the engine's mtime fallback
        # (fail-open; on main every merged card is complete). A PR that
        # adds an `in-progress` card stays red until the card flips
        # complete. Session cards DELETED by the diff are a hard red —
        # session memory is append-only; the card list uses
        # --diff-filter=d (deletions excluded), so without the explicit
        # --diff-filter=D capture a deletion-only PR fell to the no-card
        # fallback and merged while erasing session memory (external
        # review #226 finding G-2; same guard in the generated adopter
        # gate, src/engine/adopt.py live_ci_workflow()).
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          cards="$(git diff --name-only --diff-filter=d "$range" -- '.sessions/*.md' ':!.sessions/README.md' 2>/dev/null)"
          deleted="$(git diff --name-only --diff-filter=D "$range" -- '.sessions/*.md' ':!.sessions/README.md' 2>/dev/null)"
          echo "session gate cards: ${cards:-<none - mtime fallback>}"
          fail=0
          if [ -n "$deleted" ]; then
            while IFS= read -r card; do
              [ -z "$card" ] && continue
              echo "session card DELETED by this PR (session memory is append-only — hard red): $card"
            done <<< "$deleted"
            fail=1
          fi
          if [ -z "$cards" ]; then
            python3 dist/bootstrap.py check --strict --require-session-log || fail=1
          else
            while IFS= read -r card; do
              [ -z "$card" ] && continue
              echo "grading session card: $card"
              python3 dist/bootstrap.py check --strict --require-session-log --session-log "$card" || fail=1
            done <<< "$cards"
          fi
          exit "$fail"

  # ── TEMPORARY legacy-context aliases (delete after P10 lands) ─────────────
  # Discovered live in PR #6: an owner-landed ruleset on main requires the
  # ORIGINAL job names "Kit test suite" and "Cold-adoption smoke (adopt +
  # check --strict)". Those jobs were folded into kit-quality above, so the
  # legacy contexts would sit "expected" forever and block every merge. These
  # aliases report the legacy contexts as kit-quality's result. Once the
  # ruleset requires `kit-quality` instead (docs/current-state.md 👤 P10),
  # delete both jobs.
  #
  # `if: always()` + explicit result check, NOT a bare `needs:` — the KL-1
  # PR #7 hole: when kit-quality FAILS, a bare-needs alias is SKIPPED, and
  # GitHub treats a skipped check run as SATISFYING a required status check,
  # so auto-merge merged a red PR. The aliases must conclude failure, never
  # skipped, when kit-quality is not a success.
  legacy-alias-test:
    name: Kit test suite
    needs: kit-quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.kit-quality.result }}" != "success" ]; then
            echo "kit-quality result: ${{ needs.kit-quality.result }} — failing the alias (a skipped alias would satisfy the required context)."
            exit 1
          fi
          echo "legacy required-context alias — real gate is kit-quality"
  legacy-alias-smoke:
    name: Cold-adoption smoke (adopt + check --strict)
    needs: kit-quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.kit-quality.result }}" != "success" ]; then
            echo "kit-quality result: ${{ needs.kit-quality.result }} — failing the alias (a skipped alias would satisfy the required context)."
            exit 1
          fi
          echo "legacy required-context alias — real gate is kit-quality"
